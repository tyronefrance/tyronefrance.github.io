<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyfra UK - Shop on Etsy</title>
    <meta http-equiv="refresh" content="3; url=https://www.etsy.com/shop/TyfraUK" />
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 80px 20px;
            background-color: #f8f8f8;
            color: #333;
        }
        .logo {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #e47a3d; /* Etsy orange feel */
        }
        p {
            font-size: 18px;
            max-width: 500px;
            margin: 0 auto 30px;
        }
        a {
            color: #e47a3d;
            text-decoration: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #e47a3d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="logo">TYFRA UK</div>
    <p>Redirecting you to our official Etsy store...</p>
    <div class="spinner"></div>
    <p>If you are not redirected automatically,<br>
    please <a href="https://www.etsy.com/shop/TyfraUK">click here</a> to visit the shop.</p>
</body>
</html>
